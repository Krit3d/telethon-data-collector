services:
  db:
    image: postgres:17
    container_name: tg_parser_db
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tg_parser}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tg_parser}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - parser_network

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: tg_parser_qdrant
    restart: always
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    # healthcheck:
    #   test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6333/health" ]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 10
    #   start_period: 5s
    networks:
      - parser_network

  parser:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tg_parser_app
    env_file:
      - ../.env
    environment:
      HUGGINGFACE_HUB_CACHE: /app/.cache/huggingface
      DB_URL: ${DB_URL:-postgresql+asyncpg://postgres:postgres@db:5432/tg_parser}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-telegram_posts}
      POSTS_LIMIT: ${POSTS_LIMIT:-10}
      CONCURRENCY: ${CONCURRENCY:-10}
      SESSION_NAME: ${SESSION_NAME:-telethon}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NETWORK_RETRIES: ${NETWORK_RETRIES:-5}
      NETWORK_RETRY_BASE_DELAY_S: ${NETWORK_RETRY_BASE_DELAY_S:-1.0}
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ../:/app
      - hf_cache:/app/.cache/huggingface
    stdin_open: true
    tty: true
    networks:
      - parser_network

networks:
  parser_network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  hf_cache:
